<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tonnage — coming soon</title>
  <meta name="description" content="Tonnage is on the way." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,900,100&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0d0b;
      --fg: #f3ede0;
      --muted: #6c655a;
      --accent: #d97a2c;
    }
 
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    html, body { min-height: 100%; }
 
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
 
    /* subtle film grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.07;
      pointer-events: none;
      z-index: 1;
    }
 
    header, main, footer { position: relative; z-index: 2; }
 
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.75rem 2.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    header .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.65rem;
      vertical-align: middle;
      animation: pulse 2.4s ease-in-out infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.2); }
    }
 
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 2.5rem;
    }
 
    .wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 900;
      font-variation-settings: 'opsz' 144, 'SOFT' 100;
      font-size: clamp(5rem, 26vw, 26rem);
      line-height: 0.82;
      letter-spacing: -0.055em;
      color: var(--fg);
      margin-left: -0.04em;
      animation: settle 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
 
    .wordmark .dot-end { color: var(--accent); }
 
    @keyframes settle {
      0%   { transform: translateY(-1.5rem); opacity: 0; }
      100% { transform: translateY(0);       opacity: 1; }
    }
 
    .tagline {
      margin-top: 1.75rem;
      max-width: 32rem;
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 0.9s 0.4s ease-out forwards;
    }
 
    @keyframes fadeUp {
      from { opacity: 0;   transform: translateY(0.5rem); }
      to   { opacity: 0.72; transform: translateY(0); }
    }
 
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 1.75rem 2.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.7s ease-out forwards;
    }
 
    .domains {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      text-align: right;
    }
 
    .domains .primary { color: var(--fg); }
 
    @media (max-width: 640px) {
      header, main, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      footer { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .domains { text-align: left; }
      .tagline { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <span><span class="dot"></span>Tonnage</span>
    <span>Est. 2026</span>
  </header>
 
  <main>
    <h1 class="wordmark">tonnage<span class="dot-end">.</span></h1>
    <h2>Digital Waste Transfer Notes</h2>
    <p class="tagline">Big changes around digital waste transfer notes are coming. We're almost ready, are you?</p>
  </main>
 
  <footer>
    <span>Coming Soon</span>
    <div class="domains">
      <span>mytonnage.co.uk &middot; mytonnage.com</span>
    </div>
  </footer>
</body>
</html>
